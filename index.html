<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width",initial-scale=1.0">
    <title>Surviving Dinos As a Cactus Speedrun</title>
    <style>
        *{
            box-sizing:border-box;
            margin: 0;
            padding:0;
        }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            text-align: center;
        }
        p {
            margin-bottom: 20px;
            color: #aaa;
            font-size: 0.9rem;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: border-color 1s ease;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        .hidden {
            display:none !important;
        }
        .btn-group{
            display: flex;
            gap:15px;
            margin-bottom:15px
        }
        #start-btn {
            padding:12px 30 px;
            font-weight: blood;
            background:#4CAF50;
            color: white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            box-shadow:0 5px 15px rgba(0, 0,0,0.3);
            transition:all 0.2s;
        }
        #start-btn:hover{
            background:#45a049;
            translate: translateY(-2px);
        }
        #exit-btn {
            padding:12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #f44336;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        #exit-bnt:hover {
            background: #da190b;
            transform: translateY(-2px);
        }
        #in-game-exit-btn {
            position:absolute;
            top:15px;
            left:15px;
            padding:6px 14px;
            font-size:0.85rem;
            background:rgba(244,67,54,0.4);
            color:#ffcccc;
            border-radius:4px;
            cursor:pointer;
            z-index: 5;
            transition:all 0.2s;
        }
        #in-game-exit-btn:hover {
            background: rgba(244,67,54,0.8);
            color:white;
        }
        #game-over-text {
            font-size:3rem;
            color:#ff4444;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .toggle-container {
            display:flex;
            align-items:center;
            gap: 8px;
            font-size: 0.95rem;
            color:#ccc;
            cursor: pointer;
            user-select:none;
        }
        .toggle-container-input {
            cursor:pointer;
            width: 16px;
            height: 16px;
            accent-color: #4CAF50;
        }
        </style>
    </head>    
<body>

    <h1>SURVIVING DINOS AS A CACTUS SPEEDRUN</h1>
    <p>Controls:[Space/Up Arrow] to Jump | [Down Arrow] to Duck</p>
    
    <div id="game-container">
        <button id="in-game-exit-btn" class="hidden">EXIT</button>
        <div id="ui-overlay">
            <div id="game-over-text" class="hidden">GAME OVER</div>
            <div class="btn-group">
                <button id="start-btn">PLAY GAME</button>
                <button id="exit-btn" class="hidden">EXIT</button>
            </div>
            <label class="toggle-container">
                <input type="checkbox" id="slow-mode-checkbox">
                Relaxed Start (Slower Speed)
            </label>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

<script>
    const canvas =document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiOverlay= document.getElementById('ui-overlay');
    const startBtn = document.getElementById('start-btn');
    const exitBtn = document.getElementById('exit-btn');
    const inGameExitBtn = document.getElementById('in-game-exit-btn');
    const gameOverText = document.getElementById('game-over-text');
    const gameContainer = document.getElementById('game-container');
    const slowModeCheckbox = document.getElementById('slow-mode-checkbox');

    let gameActive = false;
    let score = 0;
    let highscore= 0;
    let gameSpeed = 6.5;
    let startingSpeedSetting = 6.5;
    let frameCount = 0;
    let nextObstacleFrame = 100;
    let nextBuffFrame = 300;
    let stars =[];
    let obstacles = [];
    let activeBuffs=[];
    let lastTimeState = 'day';

    let currentWeather = 'clear';
    let weatherTimer=0;
    let weatherParticles = [];
    let weatherTagetFrame = 0;
    const groundY = 320;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
        }
    }



</script>

            
</html>
